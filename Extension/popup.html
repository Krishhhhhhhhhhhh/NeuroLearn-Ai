<!DOCTYPE html>
<html>
<head>
    <title>Job Description Redirector</title>
    <script src="popup.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            width: 280px;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        #status {
            color: #555;
            font-size: 14px;
            margin-bottom: 15px;
        }
        #keywordsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword-button {
            padding: 6px 10px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background-color 0.2s;
        }
        .keyword-button:hover {
            background-color: #e0e0e0;
        }
        .loading-animation {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h3>AI-Powered Learning</h3>
    <div id="status">Scraping job data...</div>
    <div id="keywordsContainer">
        <div class="loading-animation"></div>
    </div>
</body>
</html>
